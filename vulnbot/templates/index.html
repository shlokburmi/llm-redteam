<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBot Chat</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 600px; background: #2a2a2a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { background: #3a3a3a; padding: 20px; text-align: center; border-bottom: 1px solid #444; font-weight: bold; letter-spacing: 1px;}
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
        .user-message { background: #4a90e2; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-message { background: #444; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #222; color: #fff; outline: none; }
        button { padding: 12px 20px; background: #4a90e2; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">VulnBot Support</div>
        <div class="messages" id="messages">
            <div class="message bot-message">Hello! I'm VulnBot from AcmeCorp. How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msgs = document.getElementById('messages');
            const text = input.value.trim();
            if (!text) return;

            msgs.innerHTML += `<div class="message user-message">${text}</div>`;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: text})
                });
                const data = await res.json();
                msgs.innerHTML += `<div class="message bot-message">${data.response || data.error}</div>`;
                msgs.scrollTop = msgs.scrollHeight;
            } catch (err) {
                msgs.innerHTML += `<div class="message bot-message" style="color:#ff6b6b;">Error connecting to server.</div>`;
            }
        }
        function handleKey(e) { if(e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
